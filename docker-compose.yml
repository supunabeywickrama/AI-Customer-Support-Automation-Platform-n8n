version: "3"

services:

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
    volumes:
      - ./workflows:/home/node/.n8n

  postgres:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support123
      POSTGRES_DB: supportdb
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"